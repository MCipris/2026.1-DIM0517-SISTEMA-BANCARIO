name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with: 
          python-version: '3.12'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar Testes do Django
        working-directory: ./2026.1-DIM9517-SISTEMA-BANCARIO/banco_Safe
        run: |
          python manage.py test

      - name: Estabelecer a tag de build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="build-${{ github.run_number }}"
          git tag $TAG_NAME
          git push origin $TAG_NAME 

      - name: Login no Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/sistema-bancario:build-${{ github.run_number }}
      
  tag:
  if: ${{ github.head_ref  == "staging" && github.event_name == "pull_request" }}
  
  runs-on: ubuntu-latest
  steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: 'Definir tag caso a branch head seja staging'
      run: |
        prev_tag=$(git describe --tags --abbrev=0)
        readarray -d "." -t array <<< "$prev_tag"
        TAG_NAME=${array[0]}"."$((array[1] + 1))
        git tag $TAG_NAME
        git push origin $TAG_NAME
