name: Production

on:
  pull_request:
    branches:
      - production
    types: [closed]

jobs:
  tag:
    if: github.head_ref == 'staging'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: 'Definir tag caso a branch head seja staging'
        run: |
          prev_tag=$(git describe --tags --abbrev=0)
          readarray -d "." -t array <<< "$prev_tag"
          TAG_NAME=${array[0]}"."$((array[1] + 1))
          git tag $TAG_NAME
          git push origin $TAG_NAME

  hotfix-production:
    if: github.event.pull_request.merged == true && startsWith(github.head_ref, 'hotfix')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Resolver Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff 
        
      - name: Buildar o Sistema
        run: |
          python -m compileall .

      - name: Procura erros de código com o Ruff Lint
        run: ruff check .

      - name: Executar Testes Unitários
        working-directory: ./2026.1-DIM9517-SISTEMA-BANCARIO/banco_Safe
        run: |
          python manage.py test

      - name: Determinar e Criar Nova Tag REL
        id: prod_tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          LATEST_REL=$(git tag -l "rel-*" --sort=-v:refname | head -n 1)
          
          if [ -z "$LATEST_REL" ]; then
            NEW_REL="rel-1.0.1"
          else
            VERSION_NUM=${LATEST_REL#rel-}
            
            POINTS=$(tr -cd '.' <<< "$VERSION_NUM" | wc -m)
            
            if [ "$POINTS" -eq 1 ]; then
              NEW_REL="rel-${VERSION_NUM}.1"
            else
              IFS='.' read -r X Y Z <<< "$VERSION_NUM"
              NEW_REL="rel-$X.$Y.$((Z + 1))"
            fi
          fi
          
          echo "Nova tag gerada: $NEW_REL"
          git tag $NEW_REL
          git push origin $NEW_REL
          
          echo "tag_name=$NEW_REL" >> $GITHUB_OUTPUT

      - name: Gerar pacote ZIP do sistema
        run: |
          zip -r ${{ steps.prod_tag.outputs.tag_name }}.zip . -x "*.git*" "*venv*" "*__pycache__*"

      - name: Disponibilizar a versão do sistema para Download
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prod_tag.outputs.tag_name }}
          path: ${{ steps.prod_tag.outputs.tag_name }}.zip

      - name: Login no Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push da imagem de Produção
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/sistema-bancario:${{ steps.prod_tag.outputs.tag_name }}    
